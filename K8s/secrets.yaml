apiVersion: v1
kind: Secret
metadata:
  name: jiradata-secrets
  namespace: default
type: Opaque
stringData:
  jira-base-url: "https://your-jira-instance.atlassian.net"
  jira-username: "your-email@example.com"
  jira-api-token: "your-api-token-here"
  sql-connection-string: "Server=your-sql-server;Database=your-db;User Id=sa;Password=your-password;TrustServerCertificate=true;Encrypt=false;"
